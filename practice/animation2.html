<!DOCTYPE html>
<html lang="en">
<head>
<title> 2/27 Animation </title>
</head>
<body>

<canvas id="myCanvas"
width=800
height=800>

</canvas>
<script>
const canvas=document
.getElementById("myCanvas");
const ctx = canvas.getContext("2d");
let x = 1;
let speed=0.5;
let time=1;
let y=1;
let speed2 = 1;
function animate(){
x = x + speed;
y = y + speed2;
time = time + 1;

if(time<160){
y = y + speed;
}

if(time>160){
x=x + speed;
}

if(x>800){
x = 0;
}
ctx.clearRect(0,0,800,800);
ctx.fillStyle="orange";
ctx.fillRect(x,y,10,50);
console.log(x);
requestAnimationFrame(animate);

ctx.fillStyle="red";
ctx.fillRect(x,y,10,50);
console.log(x);
requestAnimationFrame(animate);

}
animate();
</script>
</body>
</html>
